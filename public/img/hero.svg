<svg viewBox="0 0 440 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">A bowl of food with a macro nutrition ring</title>
  <desc id="heroDesc">An illustration combining a healthy bowl with a circular macro chart and calorie and nutrition data, representing welanutria's calculators and recipes.</desc>

  <!-- soft backdrop circle -->
  <circle cx="220" cy="195" r="165" fill="#E8F4F1"/>
  <circle cx="220" cy="195" r="165" stroke="#DCEAE6" stroke-width="1.5"/>

  <!-- macro ring (protein green / carbs amber / fat clay) -->
  <g transform="rotate(-90 220 195)" fill="none" stroke-width="16" stroke-linecap="round">
    <!-- protein 30% -->
    <circle cx="220" cy="195" r="138" stroke="#2E6B57" stroke-dasharray="260 607" stroke-dashoffset="0"/>
    <!-- carbs 40% -->
    <circle cx="220" cy="195" r="138" stroke="#D99A2B" stroke-dasharray="347 607" stroke-dashoffset="-268"/>
    <!-- fat 30% -->
    <circle cx="220" cy="195" r="138" stroke="#C25A4D" stroke-dasharray="260 607" stroke-dashoffset="-623"/>
  </g>

  <!-- bowl -->
  <ellipse cx="220" cy="210" rx="118" ry="30" fill="#235244" opacity="0.12"/>
  <path d="M112 196 a108 108 0 0 0 216 0 Z" fill="#ffffff" stroke="#DCEAE6" stroke-width="1.5"/>
  <ellipse cx="220" cy="196" rx="108" ry="26" fill="#F4FAF9" stroke="#DCEAE6" stroke-width="1.5"/>

  <!-- bowl contents: grains base -->
  <ellipse cx="220" cy="196" rx="98" ry="22" fill="#FBF3E3"/>

  <!-- veggies / toppings -->
  <circle cx="185" cy="192" r="16" fill="#6DA98C"/>
  <circle cx="185" cy="192" r="16" stroke="#2E6B57" stroke-width="1.5"/>
  <circle cx="232" cy="188" r="13" fill="#D99A2B"/>
  <circle cx="232" cy="188" r="13" stroke="#B57E12" stroke-width="1.5"/>
  <circle cx="262" cy="197" r="11" fill="#C25A4D"/>
  <circle cx="262" cy="197" r="11" stroke="#A8453A" stroke-width="1.5"/>
  <ellipse cx="208" cy="200" rx="15" ry="9" fill="#2E6B57"/>
  <circle cx="246" cy="201" r="8" fill="#6DA98C"/>
  <circle cx="170" cy="200" r="7" fill="#D99A2B"/>

  <!-- a little leaf garnish -->
  <path d="M214 174 q12 -16 28 -10 q-4 18 -28 10 Z" fill="#6DA98C" stroke="#2E6B57" stroke-width="1.2"/>
  <path d="M228 168 l2 8" stroke="#2E6B57" stroke-width="1.2" stroke-linecap="round"/>

  <!-- kcal data badge (top right) -->
  <g>
    <rect x="300" y="70" width="104" height="52" rx="14" fill="#ffffff" stroke="#DCEAE6" stroke-width="1.5"/>
    <text x="316" y="98" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#2E6B57">580</text>
    <text x="316" y="113" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="0.8" fill="#5C8A82">KCAL / SERVING</text>
  </g>

  <!-- macro mini chips (left) -->
  <g font-family="Inter, sans-serif">
    <g>
      <rect x="36" y="150" width="92" height="30" rx="15" fill="#ffffff" stroke="#DCEAE6" stroke-width="1.5"/>
      <circle cx="54" cy="165" r="6" fill="#2E6B57"/>
      <text x="66" y="169" font-size="12" font-weight="700" fill="#1F3D34">32g P</text>
    </g>
    <g>
      <rect x="30" y="188" width="92" height="30" rx="15" fill="#ffffff" stroke="#DCEAE6" stroke-width="1.5"/>
      <circle cx="48" cy="203" r="6" fill="#D99A2B"/>
      <text x="60" y="207" font-size="12" font-weight="700" fill="#1F3D34">54g C</text>
    </g>
    <g>
      <rect x="42" y="226" width="84" height="30" rx="15" fill="#ffffff" stroke="#DCEAE6" stroke-width="1.5"/>
      <circle cx="60" cy="241" r="6" fill="#C25A4D"/>
      <text x="72" y="245" font-size="12" font-weight="700" fill="#1F3D34">18g F</text>
    </g>
  </g>

  <!-- small sparkle / plus accents -->
  <path d="M338 150 l0 14 M331 157 l14 0" stroke="#6DA98C" stroke-width="2" stroke-linecap="round"/>
  <circle cx="96" cy="110" r="4" fill="#D99A2B"/>
  <circle cx="350" cy="300" r="5" fill="#6DA98C"/>
</svg>
